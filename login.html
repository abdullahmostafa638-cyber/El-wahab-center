<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز الوهاب — تسجيل الدخول</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- ══════════════════════════════════════
       BACKGROUND LAYERS
  ══════════════════════════════════════ -->
  <div class="bg"></div>
  <div class="bg-glow"></div>
  <div class="bg-pattern"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ══════════════════════════════════════
       SUCCESS OVERLAY
  ══════════════════════════════════════ -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-circle">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="success-text">أهلاً بك ✦</div>
    <div class="success-sub">جارٍ التحويل…</div>
  </div>

  <!-- ══════════════════════════════════════
       LOGIN CARD
  ══════════════════════════════════════ -->
  <div class="scene">
    <div class="card">

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-ring">
          <img
            src="logo-placeholder.png"
            alt="مركز الوهاب"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
          >
          <div class="logo-fallback" style="display:none">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L3 7l9 5 9-5-9-5z"  stroke="#d09632" stroke-width="1.6"/>
              <path d="M3 12l9 5 9-5"            stroke="#d09632" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M3 17l9 5 9-5"            stroke="#d09632" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <span class="brand-name">مركز الوهاب</span>
        <span class="brand-sub">بوابة الطالب</span>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="div-line"></div>
        <span class="div-icon">✦</span>
        <div class="div-line r"></div>
      </div>

      <!-- Username field -->
      <div class="field">
        <label class="field-label" for="username">اسم المستخدم</label>
        <div class="input-wrap">
          <input
            class="field-input"
            type="text"
            id="username"
            placeholder="أدخل اسم المستخدم"
            autocomplete="off"
            spellcheck="false"
          >
          <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"
                    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Password field -->
      <div class="field">
        <label class="field-label" for="password">كلمة المرور</label>
        <div class="input-wrap">
          <input
            class="field-input"
            type="password"
            id="password"
            placeholder="أدخل كلمة المرور"
            autocomplete="current-password"
          >
          <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="3"
                    stroke="currentColor" stroke-width="1.6"/>
              <path d="M7 11V7a5 5 0 0110 0v4"
                    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <button class="pass-toggle" type="button" id="togglePass"
                  aria-label="إظهار/إخفاء كلمة المرور">
            <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    stroke="currentColor" stroke-width="1.6"/>
              <circle cx="12" cy="12" r="3"
                      stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Login button -->
      <button class="login-btn" id="loginBtn" onclick="handleLogin()">
        <div class="btn-text">
          <div class="spinner" id="spinner"></div>
          <span id="btnLabel">LOGIN</span>
        </div>
      </button>

      <!-- Error message -->
      <div class="error-msg" id="errorMsg">
        ⚠ اسم المستخدم أو كلمة المرور غير صحيحة
      </div>

      <!-- Bottom brand -->
      <div class="bottom-brand">
        مركز الوهاب <span>✦</span> لحفظ القرآن الكريم
      </div>

    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/login.js"></script>

</body>
</html>
